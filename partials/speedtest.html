<!-- SpeedTest Section (OpenSpeedTest Embed) -->
<section id="speedtest" class="py-20 bg-white border-t border-slate-100 relative overflow-hidden">
    <div class="speedtest-grid"></div>
    <div class="container mx-auto px-4 relative z-10">
        <div class="max-w-5xl mx-auto speedtest-shell">
            <div class="speedtest-hero px-6 py-10 md:px-12">
                <div class="relative z-10 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-8">
                    <div class="max-w-2xl">
                        <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs uppercase speedtest-badge">
                            SpeedTest
                        </span>
                        <h2 class="text-3xl md:text-4xl font-extrabold mt-4">Teste sua velocidade</h2>
                        <p class="text-blue-100 mt-3 text-lg">
                            Faça o teste diretamente aqui e confira o desempenho da sua conexão.
                        </p>
                        <div class="mt-6 flex flex-wrap items-center gap-4">
                            <a href="#speedtest-widget" class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full text-white font-bold speedtest-btn transition">
                                Iniciar teste
                                <i data-lucide="play" class="h-5 w-5"></i>
                            </a>
                            <span class="text-xs uppercase tracking-[0.25em] text-blue-200">OpenSpeedTest</span>
                        </div>
                    </div>
                    <div class="hidden md:flex items-center justify-center">
                        <div class="speedtest-gauge">
                            <div class="speedtest-gauge-content">
                                <i data-lucide="gauge" class="h-10 w-10 mx-auto mb-3"></i>
                                <div class="text-3xl font-extrabold leading-none">Mbps</div>
                                <div class="text-xs uppercase tracking-[0.25em] text-blue-200 mt-2">Speed</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="speedtest-widget" class="bg-white p-4 md:p-6">
                <div class="min-h-[360px]">
                    <div class="w-full h-0 pb-[56.25%] relative">
                        <iframe
                            title="OpenSpeedTest"
                            src="https://openspeedtest.com/speedtest"
                            class="absolute inset-0 w-full h-full min-h-[360px] rounded-2xl border border-slate-200"
                            style="border: none; overflow: hidden;"
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"
                            allow="fullscreen"
                        ></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
